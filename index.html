<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Club Finder — Найди место, играй сейчас</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --bg:#030810;--bg2:#060f1c;--bg3:#0a1828;--card:#081220;
  --neon:#00ffc3;--blue:#00aaff;--red:#ff2d55;--gold:#ffaa00;--purple:#c084fc;
  --text:#b0d4ee;--muted:#3a6080;--border:rgba(0,255,195,0.12);
  --zone-std:#00aaff;--zone-vip:#c084fc;--zone-ps:#ff6b35;--zone-vr:#00ffc3;--zone-priv:#ffaa00;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);
  pointer-events:none;z-index:9998;}

header{
  position:fixed;top:0;left:0;right:0;z-index:500;
  height:62px;padding:0 28px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(3,8,16,0.94);border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);
}
.logo{font-family:'Share Tech Mono',monospace;font-size:19px;color:var(--neon);
  text-shadow:0 0 14px var(--neon);letter-spacing:3px;}
.logo em{color:var(--blue);font-style:normal;}
.nav{display:flex;gap:3px;}
.nb{background:none;border:1px solid transparent;color:var(--muted);
  font-family:'Exo 2',sans-serif;font-size:12px;font-weight:600;letter-spacing:1.5px;
  padding:7px 14px;cursor:pointer;border-radius:4px;text-transform:uppercase;transition:.2s;}
.nb:hover,.nb.on{color:var(--neon);border-color:var(--border);background:rgba(0,255,195,0.06);text-shadow:0 0 8px var(--neon);}
.nb.cta{border-color:var(--neon)!important;color:var(--neon)!important;background:rgba(0,255,195,0.07)!important;}

.page{display:none;padding-top:62px;}
.page.active{display:block;}

.hero{
  min-height:100vh;display:flex;flex-direction:column;
  justify-content:center;align-items:center;text-align:center;
  padding:80px 24px 60px;position:relative;overflow:hidden;
}
.hero-bg{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(0,255,195,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,195,.03) 1px,transparent 1px);
  background-size:50px 50px;animation:gd 25s linear infinite;
}
@keyframes gd{to{transform:translateY(50px);}}
.hero-glow{position:absolute;width:700px;height:700px;
  background:radial-gradient(circle,rgba(0,255,195,.07) 0%,transparent 65%);
  top:50%;left:50%;transform:translate(-50%,-50%);animation:br 5s ease-in-out infinite;}
@keyframes br{0%,100%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.1);}}
.hero-tag{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:5px;color:var(--neon);
  margin-bottom:18px;opacity:0;animation:ri .8s .1s forwards;}
.hero h1{font-size:clamp(36px,7vw,86px);font-weight:900;line-height:1;
  margin-bottom:20px;opacity:0;animation:ri .8s .3s forwards;}
.hero h1 .w1{color:#fff;}.hero h1 .w2{color:var(--neon);text-shadow:0 0 50px rgba(0,255,195,.5);display:block;}
.hero-sub{font-size:16px;color:var(--muted);max-width:500px;line-height:1.7;margin-bottom:42px;
  opacity:0;animation:ri .8s .5s forwards;}
@keyframes ri{from{opacity:0;transform:translateY(26px);}to{opacity:1;transform:none;}}
.hero-ctas{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;opacity:0;animation:ri .8s .7s forwards;}
.btn-p{background:var(--neon);color:#000;border:none;font-family:'Share Tech Mono',monospace;
  font-size:12px;letter-spacing:2px;padding:14px 32px;cursor:pointer;border-radius:4px;
  text-transform:uppercase;transition:.25s;box-shadow:0 0 26px rgba(0,255,195,.35);}
.btn-p:hover{background:#fff;box-shadow:0 0 48px rgba(0,255,195,.55);transform:translateY(-2px);}
.btn-o{background:transparent;color:var(--neon);border:1px solid var(--neon);
  font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:2px;
  padding:14px 32px;cursor:pointer;border-radius:4px;text-transform:uppercase;transition:.25s;}
.btn-o:hover{background:rgba(0,255,195,.08);transform:translateY(-2px);}

.sbar{display:flex;justify-content:center;gap:52px;flex-wrap:wrap;padding:26px 28px;
  background:rgba(6,15,28,.92);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.stt{text-align:center;}
.stn{font-family:'Share Tech Mono',monospace;font-size:32px;color:var(--neon);
  text-shadow:0 0 16px var(--neon);display:block;}
.stl{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
.ldot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--neon);
  margin-right:5px;animation:bl 1.4s infinite;}
@keyframes bl{0%,100%{opacity:1;box-shadow:0 0 6px var(--neon);}50%{opacity:.25;box-shadow:none;}}

.wrap{max-width:1300px;margin:0 auto;padding:68px 28px;}
.stitle{font-family:'Share Tech Mono',monospace;font-size:24px;color:#fff;letter-spacing:2px;margin-bottom:6px;}
.stitle span{color:var(--neon);}
.ssub{font-size:13px;color:var(--muted);letter-spacing:1px;margin-bottom:32px;}

.srow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px;}
.si,.ss{background:var(--card);border:1px solid var(--border);color:var(--text);
  font-family:'Exo 2',sans-serif;font-size:13px;padding:10px 14px;border-radius:4px;outline:none;transition:.2s;}
.si{flex:1;min-width:180px;}.si:focus,.ss:focus{border-color:var(--neon);}
.ss option{background:var(--bg2);}

.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px;}
.cc{background:var(--card);border:1px solid var(--border);border-radius:9px;overflow:hidden;
  cursor:pointer;transition:all .28s;position:relative;}
.cc:hover{border-color:rgba(0,255,195,.35);transform:translateY(-5px);box-shadow:0 22px 58px rgba(0,255,195,.08);}
.ci{height:130px;display:flex;align-items:center;justify-content:center;font-size:52px;
  position:relative;overflow:hidden;background:linear-gradient(135deg,#080f1a,#0d1e30);}
.ci::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,var(--card));}
.cbadge{position:absolute;top:10px;right:10px;z-index:2;padding:3px 9px;border-radius:3px;
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;}
.ob{background:rgba(0,255,195,.14);color:var(--neon);border:1px solid var(--neon);}
.cb{background:rgba(255,45,85,.12);color:var(--red);border:1px solid var(--red);}
.cb2{padding:18px;}
.cname{font-family:'Share Tech Mono',monospace;font-size:14px;color:#fff;margin-bottom:7px;letter-spacing:1px;}
.cmeta{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-bottom:14px;}

.zone-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.zchip{
  display:flex;align-items:center;gap:5px;
  padding:5px 10px;border-radius:4px;font-size:11px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;border:1px solid;
  transition:all .2s;cursor:pointer;
}
.zchip:hover{filter:brightness(1.3);}

.zt-std{color:var(--zone-std);border-color:var(--zone-std);background:rgba(0,170,255,.08);}
.zt-vip{color:var(--zone-vip);border-color:var(--zone-vip);background:rgba(192,132,252,.08);}
.zt-ps{color:var(--zone-ps);border-color:var(--zone-ps);background:rgba(255,107,53,.08);}
.zt-vr{color:var(--zone-vr);border-color:var(--zone-vr);background:rgba(0,255,195,.08);}
.zt-priv{color:var(--zone-priv);border-color:var(--zone-priv);background:rgba(255,170,0,.08);}

.cfoot{display:flex;justify-content:space-between;align-items:center;
  padding-top:12px;border-top:1px solid var(--border);}
.cprice-range{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--neon);}
.cprice-range small{font-size:10px;color:var(--muted);font-family:'Exo 2',sans-serif;}
.bbtn{background:rgba(0,255,195,.1);border:1px solid var(--neon);color:var(--neon);
  font-family:'Exo 2',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;
  padding:7px 16px;cursor:pointer;border-radius:3px;text-transform:uppercase;transition:.2s;}
.bbtn:hover{background:var(--neon);color:#000;}
.bbtn:disabled{opacity:.3;cursor:not-allowed;}

.overlay{display:none;position:fixed;inset:0;z-index:600;
  background:rgba(0,0,0,.9);backdrop-filter:blur(12px);
  justify-content:center;align-items:flex-start;padding:20px;overflow-y:auto;}
.overlay.show{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  width:100%;max-width:860px;margin:auto;animation:pi .3s ease;}
@keyframes pi{from{opacity:0;transform:scale(.93) translateY(16px);}to{opacity:1;transform:none;}}
.mhead{padding:20px 24px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
.mtitle{font-family:'Share Tech Mono',monospace;font-size:17px;color:#fff;letter-spacing:1px;}
.mclose{background:none;border:1px solid var(--border);color:var(--muted);
  width:32px;height:32px;border-radius:4px;cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0;}
.mclose:hover{border-color:var(--red);color:var(--red);}
.mbody{padding:24px;}

.zone-tabs{display:flex;gap:0;flex-wrap:wrap;margin-bottom:24px;
  border-bottom:1px solid var(--border);}
.ztab{background:none;border:none;border-bottom:2px solid transparent;
  color:var(--muted);font-family:'Exo 2',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:1px;padding:10px 18px;cursor:pointer;text-transform:uppercase;
  transition:.2s;margin-bottom:-1px;display:flex;align-items:center;gap:6px;}
.ztab.on{border-bottom-color:currentColor;}

.zone-detail{display:none;}.zone-detail.on{display:block;}
.zone-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  flex-wrap:wrap;gap:12px;margin-bottom:20px;
  padding:16px;border-radius:7px;border:1px solid;
}
.zh-info{}
.zh-name{font-family:'Share Tech Mono',monospace;font-size:16px;margin-bottom:6px;}
.zh-desc{font-size:13px;color:var(--muted);line-height:1.5;}
.zh-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.ztag{font-size:10px;padding:3px 8px;border-radius:3px;background:rgba(255,255,255,.06);color:var(--text);letter-spacing:.5px;}
.zh-price{text-align:right;flex-shrink:0;}
.zh-price-n{font-family:'Share Tech Mono',monospace;font-size:22px;font-weight:700;}
.zh-price-l{font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:2px;}
.zh-avail{font-size:11px;margin-top:6px;font-weight:700;}

.seats-label{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:8px;margin-bottom:22px;}
.seat{
  aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;
  transition:all .2s;border:2px solid transparent;
}
.seat .sn{font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700;margin-bottom:3px;}
.seat .sl{font-size:9px;letter-spacing:.5px;text-transform:uppercase;}
.seat.free{background:rgba(0,255,195,.07);border-color:rgba(0,255,195,.5);color:var(--neon);}
.seat.free:hover{background:rgba(0,255,195,.2);transform:scale(1.07);box-shadow:0 0 16px rgba(0,255,195,.3);}
.seat.busy{background:rgba(255,45,85,.06);border-color:rgba(255,45,85,.4);color:var(--red);cursor:not-allowed;}
.seat.reserved{background:rgba(255,170,0,.06);border-color:rgba(255,170,0,.4);color:var(--gold);cursor:not-allowed;}
.seat.picked{background:rgba(0,255,195,.22);border-color:var(--neon);box-shadow:0 0 20px rgba(0,255,195,.4);transform:scale(1.07);}

.sleg{display:flex;gap:16px;margin-bottom:18px;flex-wrap:wrap;}
.sleg-i{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
.sleg-d{width:13px;height:13px;border-radius:3px;}

.bform{display:none;}.bform.on{display:block;}
.fg{margin-bottom:14px;}
.fl{display:block;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.fi{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);
  font-family:'Exo 2',sans-serif;font-size:13px;padding:10px 13px;border-radius:4px;outline:none;transition:.2s;}
.fi:focus{border-color:var(--neon);}.fi::placeholder{color:var(--muted);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.sum-box{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:16px;margin-bottom:16px;}
.sr{display:flex;justify-content:space-between;font-size:13px;margin-bottom:7px;}
.sr:last-child{border-top:1px solid var(--border);padding-top:11px;margin-top:7px;
  font-size:16px;font-weight:700;color:var(--neon);margin-bottom:0;}
.sr span:first-child{color:var(--muted);}
.mbtns{display:flex;gap:10px;margin-top:18px;}
.mbtns .btn-p,.mbtns .btn-o{flex:1;padding:12px 18px;}

#map{height:460px;border-radius:8px;border:1px solid var(--border);overflow:hidden;}
.leaflet-container{background:#060f1c!important;}
.mpop{font-family:'Exo 2',sans-serif;font-size:13px;color:#fff;}
.mpop strong{color:var(--neon);font-size:14px;display:block;margin-bottom:6px;}
.mpop .zone-row{display:flex;align-items:center;gap:6px;font-size:11px;margin-bottom:3px;}

.ptabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:28px;gap:0;flex-wrap:wrap;}
.pt{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);
  font-family:'Exo 2',sans-serif;font-size:12px;font-weight:600;letter-spacing:1.5px;
  padding:11px 20px;cursor:pointer;text-transform:uppercase;transition:.2s;margin-bottom:-1px;}
.pt.on{color:var(--neon);border-bottom-color:var(--neon);}
.tab{display:none;}.tab.on{display:block;}

.owner-zones{display:flex;flex-direction:column;gap:20px;}
.oz{background:var(--card);border:1px solid var(--border);border-radius:9px;overflow:hidden;}
.oz-head{
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;
  padding:16px 20px;cursor:pointer;border-bottom:1px solid var(--border);
  transition:background .2s;
}
.oz-head:hover{background:rgba(0,255,195,.03);}
.oz-left{display:flex;align-items:center;gap:12px;}
.oz-icon{font-size:22px;}
.oz-name{font-family:'Share Tech Mono',monospace;font-size:14px;color:#fff;letter-spacing:1px;}
.oz-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.oz-right{display:flex;align-items:center;gap:10px;}
.oz-price{font-family:'Share Tech Mono',monospace;font-size:15px;color:var(--neon);}
.oz-toggle{font-size:16px;color:var(--muted);transition:transform .3s;}
.oz-body{padding:16px 20px;display:none;}
.oz-body.open{display:block;}
.oz-seats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-bottom:16px;}
.oseat{background:var(--bg3);border:1px solid var(--border);border-radius:6px;
  padding:10px 8px;text-align:center;}
.osn{font-family:'Share Tech Mono',monospace;font-size:15px;margin-bottom:5px;}
.oss{font-size:9px;letter-spacing:1px;text-transform:uppercase;font-weight:700;margin-bottom:8px;}
.osb{display:flex;gap:4px;justify-content:center;}
.ob2{padding:3px 7px;font-size:10px;font-family:'Exo 2',sans-serif;font-weight:700;
  border-radius:3px;cursor:pointer;border:1px solid;transition:.15s;}
.ob-f{border-color:var(--neon);color:var(--neon);background:rgba(0,255,195,.07);}
.ob-f:hover{background:var(--neon);color:#000;}
.ob-b{border-color:var(--red);color:var(--red);background:rgba(255,45,85,.07);}
.ob-b:hover{background:var(--red);color:#fff;}
.oz-bar{display:flex;gap:8px;justify-content:flex-end;padding-top:12px;border-top:1px solid var(--border);}

.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{text-align:left;padding:10px 13px;font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);border-bottom:1px solid var(--border);}
.tbl td{padding:11px 13px;border-bottom:1px solid rgba(0,255,195,.04);}
.tbl tr:hover td{background:rgba(0,255,195,.025);}
.sbg{padding:3px 9px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.sa{background:rgba(0,255,195,.14);color:var(--neon);}
.sp{background:rgba(255,170,0,.14);color:var(--gold);}
.sd{background:rgba(58,96,128,.2);color:var(--muted);}

.ksg{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;margin-bottom:24px;}
.ks{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px;}
.ksv{font-family:'Share Tech Mono',monospace;font-size:24px;font-weight:700;margin-bottom:4px;}
.ksl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.ksd{font-size:11px;margin-top:5px;}

.aform{max-width:660px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:28px;}
.fs{border:1px solid var(--border);border-radius:7px;padding:18px;margin-bottom:16px;}
.fst{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--neon);margin-bottom:14px;}

.zone-builder{border:1px solid var(--border);border-radius:7px;padding:18px;margin-bottom:14px;}
.zb-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.zb-title{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:1.5px;color:#fff;}
.zb-del{background:none;border:1px solid rgba(255,45,85,.3);color:var(--red);width:28px;height:28px;
  border-radius:4px;cursor:pointer;font-size:14px;transition:.2s;}
.zb-del:hover{background:var(--red);color:#fff;}

.toast-el{position:fixed;bottom:26px;right:26px;z-index:9000;
  background:var(--card);border:1px solid var(--neon);border-radius:7px;
  padding:13px 20px;color:var(--neon);font-weight:600;font-size:13px;
  transform:translateX(120%);opacity:0;transition:all .3s;
  box-shadow:0 0 26px rgba(0,255,195,.18);}
.toast-el.show{transform:none;opacity:1;}

.hc{display:flex;align-items:flex-end;gap:5px;height:80px;}
.hb{flex:1;border-radius:3px 3px 0 0;min-height:4px;
  background:linear-gradient(to top,rgba(0,255,195,.8),rgba(0,170,255,.4));}

@media(max-width:640px){
  header{padding:0 12px;}.logo{font-size:14px;}
  .wrap{padding:44px 12px;}
  .frow{grid-template-columns:1fr;}
  .sg{grid-template-columns:repeat(4,1fr);}
  .sbar{gap:24px;}
  .zone-tabs{gap:0;}
  .ztab{padding:8px 12px;font-size:11px;}
}

.auth-page{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:80px 20px 40px;position:relative;overflow:hidden;
}
.auth-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(0,255,195,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,195,.025) 1px,transparent 1px);
  background-size:50px 50px;animation:gd 25s linear infinite;
}
.auth-glow{
  position:absolute;width:600px;height:600px;
  background:radial-gradient(circle,rgba(0,170,255,.07) 0%,transparent 65%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation:br 6s ease-in-out infinite;
}
.auth-box{
  position:relative;z-index:2;
  width:100%;max-width:440px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;
  animation:pi .4s ease;
}
.auth-header{padding:28px 32px 0;text-align:center;}
.auth-logo{font-family:'Share Tech Mono',monospace;font-size:22px;
  color:var(--neon);text-shadow:0 0 18px var(--neon);letter-spacing:3px;margin-bottom:6px;}
.auth-logo em{color:var(--blue);font-style:normal;}
.auth-title{font-family:'Share Tech Mono',monospace;font-size:16px;
  color:#fff;letter-spacing:2px;margin-bottom:4px;}
.auth-sub{font-size:13px;color:var(--muted);}
.auth-tabs{display:flex;margin:22px 32px 0;background:var(--card);border-radius:6px;padding:3px;gap:3px;}
.auth-tab{flex:1;background:none;border:none;font-family:'Exo 2',sans-serif;
  font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);padding:9px;cursor:pointer;border-radius:4px;transition:.2s;}
.auth-tab.on{background:var(--neon);color:#000;}
.auth-body{padding:24px 32px 32px;}
.auth-fg{margin-bottom:15px;}
.auth-fl{display:block;font-size:10px;font-weight:600;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.auth-fi{width:100%;background:var(--card);border:1px solid var(--border);
  color:var(--text);font-family:'Exo 2',sans-serif;font-size:14px;
  padding:11px 14px;border-radius:5px;outline:none;transition:.25s;}
.auth-fi:focus{border-color:var(--neon);box-shadow:0 0 0 3px rgba(0,255,195,.08);}
.auth-fi::placeholder{color:var(--muted);}.auth-fi.err{border-color:var(--red);}
.auth-err{background:rgba(255,45,85,.1);border:1px solid rgba(255,45,85,.3);
  border-radius:5px;padding:10px 14px;font-size:12px;color:var(--red);
  margin-bottom:12px;display:none;}
.auth-err.show{display:block;}
.auth-btn{width:100%;background:var(--neon);color:#000;border:none;
  font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:2px;
  padding:14px;cursor:pointer;border-radius:5px;text-transform:uppercase;
  transition:.25s;box-shadow:0 0 22px rgba(0,255,195,.3);margin-top:4px;}
.auth-btn:hover{background:#fff;box-shadow:0 0 40px rgba(0,255,195,.5);}
.auth-btn:disabled{opacity:.5;cursor:not-allowed;}
.demo-accounts{background:var(--card);border:1px solid var(--border);
  border-radius:6px;padding:14px;margin-bottom:16px;}
.demo-title{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.demo-acc{display:flex;justify-content:space-between;align-items:center;
  font-size:12px;cursor:pointer;transition:.15s;border-radius:4px;
  padding:8px;border-bottom:1px solid rgba(0,255,195,.05);}
.demo-acc:hover{background:rgba(0,255,195,.06);}
.demo-acc:last-child{border-bottom:none;}
.demo-name{color:#fff;font-weight:700;}
.demo-club{color:var(--muted);font-size:11px;}
.demo-fill{font-size:10px;color:var(--neon);letter-spacing:1px;}
.owner-panel-head{display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:14px;margin-bottom:26px;
  padding:18px 22px;background:var(--card);border:1px solid var(--border);border-radius:9px;}
.oph-left{display:flex;align-items:center;gap:14px;}
.oph-avatar{width:46px;height:46px;border-radius:8px;
  background:linear-gradient(135deg,var(--neon),var(--blue));
  display:flex;align-items:center;justify-content:center;
  font-family:'Share Tech Mono',monospace;font-size:17px;font-weight:700;color:#000;}
.oph-name{font-family:'Share Tech Mono',monospace;font-size:15px;color:#fff;letter-spacing:1px;}
.oph-club{font-size:12px;color:var(--muted);margin-top:2px;}
.oph-badge{padding:3px 10px;border-radius:3px;font-size:10px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
  background:rgba(0,255,195,.12);color:var(--neon);border:1px solid rgba(0,255,195,.25);}
</style>
</head>
